<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>AELION TORRE</title>
<style>
body{margin:0;background:#0a0a0a;color:#00ff88;font-family:Consolas,monospace;display:flex;flex-direction:column;height:100vh}
header{padding:14px;text-align:center;border-bottom:1px solid #00ff88}
#chat{flex:1;overflow-y:auto;padding:20px;display:flex;flex-direction:column;gap:12px}
.msg{max-width:80%;padding:12px;border-radius:10px}
.user{align-self:flex-end;background:#00ff88;color:#000}
.aelion{align-self:flex-start;background:#1a1a1a;border:1px solid #00ff88}
#controls{display:flex;padding:12px;gap:8px;border-top:1px solid #00ff88}
input{flex:1;background:#000;color:#00ff88;border:1px solid #00ff88;padding:10px;border-radius:6px}
button{background:#00ff88;color:#000;border:0;padding:10px 16px;border-radius:6px;font-weight:bold;cursor:pointer}
</style>
</head>
<body>
<header>🐺 AELION - TORRE LOCAL</header>
<div id="chat"></div>
<div id="controls">
<input id="inp" placeholder="Escribe aquí..."><button id="btn">Enviar</button>
</div>
<script>
const chat=document.getElementById('chat'), inp=document.getElementById('inp'), btn=document.getElementById('btn');
function add(t,c){const d=document.createElement('div');d.className='msg '+c;d.textContent=t;chat.appendChild(d);chat.scrollTop=chat.scrollHeight}
async function send(){
 const m=inp.value.trim(); if(!m) return;
 add(m,'user'); inp.value='';
 try{
  const r=await fetch('/chat',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({message:m,user_id:'pablo'})});
  const j=await r.json();
  add(j.response||j.error||'sin respuesta','aelion');
 }catch(e){add('Failed to fetch - api.py no esta corriendo','aelion');}
}
btn.onclick=send; inp.onkeydown=e=>{if(e.key==='Enter')send()};
add('Aelion en torre activo. ¿Qué hacemos, lobo?','aelion');
</script>
</body>
</html>
